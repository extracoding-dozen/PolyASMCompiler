<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Go Obfuscator IDE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
    <!-- Верхняя часть (Рабочая область) -->
    <div class="workspace">
        <!-- Левая колонка -->
        <div class="left-panel">
            <div class="ide-container">
                <!-- Заголовок с кнопкой LOAD -->
                <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <span>main.ps</span>
                    <!-- Кнопка загрузки скрипта -->
                    <button class="btn-secondary" style="padding: 2px 10px; font-size: 10px;" onclick="document.getElementById('file-input').click()">
                        📂 LOAD .PS
                    </button>
                    <!-- Скрытый инпут для выбора файла (только .ps) -->
                    <input type="file" id="file-input" accept=".ps" style="display: none;" onchange="loadPsFile(event)">
                </div>

                <div class="editor-wrapper">
                    <pre id="highlighting-layer" aria-hidden="true"><code id="highlighting-content"></code></pre>
                    <textarea id="editor" spellcheck="false" placeholder="// Пишите код или загрузите файл .ps..."></textarea>
                </div>
            </div>
            <div class="resizer-horizontal"></div>
            <div class="logs-container">
                <div class="panel-header">Logs</div>
                <div id="logs-output"></div>
            </div>
        </div>

        <div class="resizer-vertical"></div>

        <!-- Правая колонка -->
        <!-- Правая колонка -->
        <div class="right-panel">
            <!-- Обертка для заголовка и кнопки -->
            <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center;">
                <span>COMPILED DATA (ASM)</span>
                <button class="btn-secondary" style="padding: 2px 10px; font-size: 10px;" onclick="saveAsmFile()">
                    💾 SAVE
                </button>
            </div>
            <div class="compiled-wrapper">
                <pre id="compiled-output"></pre>
            </div>
        </div>
    </div>

    <!-- Нижняя часть (Настройки и кнопки) -->
    <!-- Нижняя часть (Настройки и кнопки) -->
    <div class="settings-panel">

        <!-- Базовые настройки -->
        <div class="settings-column">
            <span class="panel-header-small">COMPILER SETTINGS</span>
            <select id="opt-level">
                <option value="O0">Opt: O0</option>
                <option value="O1">Opt: O1</option>
                <option value="O2" selected>Opt: O2</option>
            </select>
            <label><input type="checkbox" id="debug-mode"> Debug Mode</label>
        </div>

        <!-- Настройки обфускации -->
        <div class="settings-column obf-box">
                <span class="panel-header-small">
                    <input type="checkbox" id="enable-obfuscation" checked> OBFUSCATION
                </span>
            <div class="obf-grid">
                <label><input type="checkbox" id="chk-sandbox" checked> Sandbox Noise</label>
                <label><input type="checkbox" id="chk-string" checked> String Crypt</label>
                <label><input type="checkbox" id="chk-opaque" checked> Opaque Preds</label>

                <div class="num-input">
                    <label>Noise Freq:</label>
                    <input type="number" id="num-noise" value="60" min="0" max="100">
                </div>
                <div class="num-input">
                    <label>Opaque Freq:</label>
                    <input type="number" id="num-opaque" value="50" min="0" max="100">
                </div>
            </div>
        </div>

        <!-- Кнопки действий -->
        <div class="actions-group">
            <div class="graph-btns">
                <button class="btn-secondary" onclick="openGraph('pre')">PRE-OBFUSCATION</button>
                <button class="btn-secondary" onclick="openGraph('post')">POST-OBFUSCATION</button>
            </div>
            <button class="btn-primary" onclick="runCompilation()">
                <span class="play-icon">▶</span> RUN
            </button>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
